name: 'Run go tests'
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read
jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - run: go test -v ./...
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: false
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8 run
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: run govulncheck
        run: govulncheck ./...
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@latest
      - name: gitleaks scan working tree
        run: gitleaks detect --no-git --redact --source .
  docker-image-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: smoke Docker image
        run: scripts/smoke-image.sh
